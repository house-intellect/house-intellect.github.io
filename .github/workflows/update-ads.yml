name: Update app-ads.txt

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight UTC
  workflow_dispatch:     # Manual trigger

jobs:
  update-ads:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run merge script
        run: |
          chmod +x merge-ads.sh
          ./merge-ads.sh

      - name: Verify output file
        run: |
          if [ ! -f "static/app-ads.txt" ]; then
            echo "❌ Error: app-ads.txt was not created"
            exit 1
          fi
          
          if [ ! -s "static/app-ads.txt" ]; then
            echo "❌ Error: app-ads.txt is empty"
            exit 1
          fi
          
          echo "✓ app-ads.txt created successfully"
          echo "  Lines: $(wc -l < static/app-ads.txt)"
          echo "  Size: $(du -h static/app-ads.txt | cut -f1)"
          echo ""
          echo "Preview (first 20 lines):"
          head -20 static/app-ads.txt

      - name: Commit and Push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/app-ads.txt
          
          if git diff --staged --quiet; then
            echo "ℹ No changes detected in app-ads.txt"
            echo "changes_made=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: auto-update app-ads.txt"
            if git push; then
              echo "✓ Successfully pushed changes"
              echo "changes_made=true" >> $GITHUB_OUTPUT
            else
              echo "⚠ Push failed, may be no network changes"
              echo "changes_made=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Trigger Hugo Build (if changed)
        if: steps.commit.outputs.changes_made == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('Triggering Hugo build...');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'hugo.yml',
              ref: 'main'
            });
            console.log('✓ Hugo build triggered');

      - name: Workflow Summary
        if: always()
        run: |
          echo "## 📋 App-Ads Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✓ Completed" >> $GITHUB_STEP_SUMMARY
          if [ -f "static/app-ads.txt" ]; then
            echo "- **Lines**: $(wc -l < static/app-ads.txt)" >> $GITHUB_STEP_SUMMARY
            echo "- **Size**: $(du -h static/app-ads.txt | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi
